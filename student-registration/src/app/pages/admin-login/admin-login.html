<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h1>Admin Login</h1>
      <p>Student Registration System</p>
    </div>

    <div class="err-box" *ngIf="errorMsg">{{ errorMsg }}</div>

    <div class="field">
      <label>Username</label>
      <input
        type="text"
        [(ngModel)]="username"
        placeholder="Enter username"
        (keyup.enter)="login()"
      />
    </div>

    <div class="field">
      <label>Password</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Enter password"
        (keyup.enter)="login()"
      />
    </div>

    <button class="btn-primary" (click)="login()" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>
  </div>
</div>
